# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI PR

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.json"
      - "**/*.json5"
      - .github/workflows/**

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prettier check
        run: npx --yes prettier --check "**/*.json5" "**/*.json"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy misconfiguration scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [syntax, security]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.syntax.result }}" != "success" ]; then
            echo "Syntax validation failed"
            exit 1
          fi

      - name: Post PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        if: always() && github.event_name == 'pull_request'
        env:
          SYNTAX_RESULT: ${{ needs.syntax.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const syntaxOk = process.env.SYNTAX_RESULT === 'success';
            const securityOk = process.env.SECURITY_RESULT === 'success';

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const check = (ok, pass, fail) => ok ? `**Pass** - ${pass}` : `**Fail** - ${fail}`;

            const body = [
              '## Renovate Config CI Report',
              '',
              '### Pipeline Status',
              `- **Syntax & Lint:** ${check(syntaxOk, 'All config files are formatted correctly.', 'Run `prettier --write` and push again.')}`,
              `- **Security Scan:** ${check(securityOk, 'No secrets or critical misconfigurations found.', 'Review gitleaks or trivy findings.')}`,
              '',
              '### Conclusion',
              `**Ready to Merge:** ${syntaxOk ? 'Yes. All required checks passed.' : 'No. Fix the failing jobs before merging.'}`,
              '',
              `[View full workflow run details](${runUrl})`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            }).catch(err => console.log('Comment failed:', err.message));
